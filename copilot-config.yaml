litellm_settings:
  drop_params: true  # 核心：自动丢弃 GitHub 不支持的 thinking 等参数
  set_verbose: true # 设置为 true 可以看到更详细的映射日志

model_list:


  # --- 1. Claude 3.5 Sonnet (Claude Code 默认首选) ---
  - model_name: opus
    litellm_params:
      model: github_copilot/claude-opus-4.6-1m # 映射到你列表里最新的 Sonnet
      extra_headers: &copilot_headers
        Editor-Version: "vscode/1.85.1"
        Copilot-Integration-Id: "vscode-chat"
  
  - model_name: sonnet
    litellm_params:
      model: github_copilot/claude-sonnet-4.6 # 映射到你列表里最新的 Opus
      extra_headers: *copilot_headers


    # Claude Opus 4.6 (Anthropic) - Max tokens: 64000, Context: 200000
  - model_name: claude-opus-4-7  # 点号被转为横线时的别名
    litellm_params:
      model: github_copilot/claude-opus-4.7
      extra_headers: *copilot_headers
    
